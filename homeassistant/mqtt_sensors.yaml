    - name: "Combined Full Capacity"
      unique_id: litime_combined_capacity_ah
      state_topic: "litime/combined/state"
      value_template: "{{ value_json.total_capacity_ah }}"
      unit_of_measurement: "Ah"
      state_class: measurement
      device: *system_device

    - name: "Combined Time Direction"
      unique_id: litime_combined_time_direction
      state_topic: "litime/combined/state"
      value_template: >-
        {{ 'Charging (to Full)' if value_json.time_direction == 'to_full' else
           ('Discharging (to Reserve)' if value_json.time_direction == 'to_empty' else 'Idle') }}
      icon: mdi:swap-vertical-bold
      device: *system_device

    - name: "Combined Time Remaining"
      unique_id: litime_combined_time_remaining_text
      state_topic: "litime/combined/state"
      value_template: >-
        {{ 'Idle' if (value_json.time_direction == 'idle' or (value_json.time_remaining_s | int(0)) <= 0) else
           ((value_json.time_remaining_s | int(0) // 3600) ~ 'h ' ~
            '%02d' | format((value_json.time_remaining_s | int(0) % 3600) // 60) ~ 'm ' ~
            ('to Full' if value_json.time_direction == 'to_full' else 'to Reserve')) }}
      icon: mdi:timer-outline
      device: *system_device

    - name: "Combined Time Remaining (Raw)"
      unique_id: litime_combined_time_remaining_s
      state_topic: "litime/combined/state"
      value_template: "{{ value_json.time_remaining_s }}"
      unit_of_measurement: "s"
      device_class: duration
      entity_category: diagnostic
      device: *system_device

    - name: "Combined Flow"
      unique_id: litime_combined_flow
      state_topic: "litime/combined/state"
      value_template: >-
        {{ 'Charging' if value_json.flow == 'charging' else
