    - name: "Battery 2 Balancing"
      unique_id: litime_battery2_balancing
      state_topic: "litime/battery2/state"
      value_template: >-
        {%- set s = value_json.balancing | string -%}
        {%- set ns = namespace(active=[]) -%}
        {%- for i in range(s | length) -%}
          {%- if s[i] == '1' -%}
            {%- set ns.active = ns.active + ['Cell ' ~ (i + 1)] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.active | join(', ') if ns.active else 'None' }}
      icon: mdi:scale-balance
      device: *battery2_device

    - name: "Battery 2 State"
      unique_id: litime_battery2_battery_state
      state_topic: "litime/battery2/state"
      value_template: >-
        {%- set n = value_json.battery_state | int(0, 16) -%}
        {%- set ns = namespace(active=[]) -%}
        {%- if (n // 1) % 2 == 1 -%}{%- set ns.active = ns.active + ['Charging'] -%}{%- endif -%}
        {%- if (n // 2) % 2 == 1 -%}{%- set ns.active = ns.active + ['Discharging'] -%}{%- endif -%}
        {%- if (n // 4) % 2 == 1 -%}{%- set ns.active = ns.active + ['Balancing'] -%}{%- endif -%}
        {%- if (n // 8) % 2 == 1 -%}{%- set ns.active = ns.active + ['Full'] -%}{%- endif -%}
        {%- if (n // 64) % 2 == 1 -%}{%- set ns.active = ns.active + ['Heating'] -%}{%- endif -%}
        {{ ns.active | join(' + ') if ns.active else 'Idle' }}
      icon: mdi:battery-heart-variant
      device: *battery2_device

    - name: "Battery 2 Heat State"
      unique_id: litime_battery2_heat_state
      state_topic: "litime/battery2/state"
      value_template: >-
        {{ 'Heating Active' if (value_json.heat_state | int(0, 16)) != 0 else 'Idle' }}
      icon: mdi:radiator
      device: *battery2_device

