# =============================================================================
#  Home Assistant package: LiTime Dual BMS + Victron MPPT (full MQTT coverage)
# =============================================================================
#  The ESP32-S3 firmware already auto-publishes MQTT Discovery for the CORE
#  battery + combined sensors (SOC, voltage, current, power, cell temp, MOS
#  temp, remaining Ah, cell delta, time remaining) — those appear automatically
#  under Settings -> Devices & Services -> MQTT with no YAML needed.
#
#  This file adds everything the auto-discovery does NOT cover:
#    - The entire Victron MPPT solar controller (auto-discovery for it does
#      not exist in the firmware at all yet)
#    - SOH, discharge cycles, cell min/max voltage, protection/balancing/
#      battery-state text, charge/discharge direction, individual cell
#      voltages (1-16 per battery), and the "connected"/LWT status sensors
#
#  It is written as a Home Assistant "package" so it merges safely alongside
#  your existing configuration.yaml and any other packages, instead of
#  fighting over a single top-level `mqtt:` key.
#
#  ── Install ──────────────────────────────────────────────────────────────
#  1. Enable packages in configuration.yaml (skip if already enabled):
#       homeassistant:
#         packages: !include_dir_named packages
#  2. Copy this file into  <config>/packages/litime_victron_mqtt.yaml
#  3. Edit the `litime` / `victron` topic-base values below (Ctrl+F/replace)
#     if you changed MQTT_TOPIC_BASE / MQTT_VICTRON_TOPIC_BASE in config.h
#     (defaults are "litime" and "victron" — matches this file as written).
#  4. Settings -> System -> Restart, or Developer Tools -> YAML -> Check
#     Configuration then "Reload All YAML Configuration".
#
#  All entities below are grouped into 3 devices: "LiTime Battery 1",
#  "LiTime Battery 2", and "Victron MPPT", plus a virtual "LiTime System"
#  device for the combined/system-wide sensors.
# =============================================================================

mqtt:
  # ── Connectivity (LWT) ────────────────────────────────────────────────────
  binary_sensor:
    - name: "LiTime Monitor Online"
      unique_id: litime_monitor_online
      state_topic: "litime/status"
      payload_on: "online"
      payload_off: "offline"
      device_class: connectivity
      device:
        identifiers: "litime_system"
        name: "LiTime System"
        manufacturer: "LiTime / Victron (custom monitor)"

    - name: "Battery 1 Connected"
      unique_id: litime_battery1_connected
      state_topic: "litime/battery1/state"
      value_template: "{{ 'ON' if value_json.connected else 'OFF' }}"
      device_class: connectivity
      device: &battery1_device
        identifiers: "litime_battery_1"
        name: "LiTime Battery 1"
        manufacturer: "LiTime"
        model: "48V 100Ah Smart ComFlex"

    - name: "Battery 2 Connected"
      unique_id: litime_battery2_connected
      state_topic: "litime/battery2/state"
      value_template: "{{ 'ON' if value_json.connected else 'OFF' }}"
      device_class: connectivity
      device: &battery2_device
        identifiers: "litime_battery_2"
        name: "LiTime Battery 2"
        manufacturer: "LiTime"
        model: "48V 100Ah Smart ComFlex"

    - name: "Victron MPPT Data Valid"
      unique_id: victron_mppt_valid
      state_topic: "victron/state"
      value_template: "{{ 'ON' if value_json.valid else 'OFF' }}"
      device_class: connectivity
      device: &victron_device
        identifiers: "victron_mppt"
        name: "Victron MPPT"
        manufacturer: "Victron Energy"
        model: "SmartSolar/BlueSolar MPPT"

  # ── Battery 1 — additional fields not covered by firmware discovery ─────
  sensor:
    - name: "Battery 1 SOH"
      unique_id: litime_battery1_soh
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.soh }}"
      device: *battery1_device

    - name: "Battery 1 Discharge Cycles"
      unique_id: litime_battery1_discharge_cycles
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.discharge_cycles }}"
      state_class: total_increasing
      device: *battery1_device

    - name: "Battery 1 Full Capacity"
      unique_id: litime_battery1_full_capacity_ah
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.full_capacity_ah }}"
      unit_of_measurement: "Ah"
      state_class: measurement
      device: *battery1_device

    - name: "Battery 1 Cell Min Voltage"
      unique_id: litime_battery1_cell_min_v
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.cell_min_v }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      device: *battery1_device

    - name: "Battery 1 Cell Max Voltage"
      unique_id: litime_battery1_cell_max_v
