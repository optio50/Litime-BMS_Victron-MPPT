# =============================================================================
#  Home Assistant package: LiTime Dual BMS + Victron MPPT (full MQTT coverage)
# =============================================================================
#  This package makes ALL LiTime + Victron MQTT data visible in Home
#  Assistant as clean, properly-split devices: "LiTime Battery 1",
#  "LiTime Battery 2", "LiTime System", and "Victron MPPT".
#
#  NOTE: older versions of the firmware ALSO auto-published a small subset
#  of these fields (SOC, voltage, current, power, etc.) via MQTT Discovery,
#  but a bug meant Battery 1 and Battery 2's discovery configs collided on
#  the same retained topic, so in practice only one (or neither) battery's
#  sensors ever actually appeared in Home Assistant. That firmware bug has
#  since been fixed (each battery now gets its own unique discovery topic
#  and attaches to the same "LiTime Battery 1"/"LiTime Battery 2" devices
#  used below) — but you do NOT need to reflash to use this file: every
#  field is fully duplicated here directly from the raw MQTT state topics,
#  independent of firmware auto-discovery, so this package alone is
#  sufficient on its own.
#
#  This file provides:
#    - Full per-battery coverage: voltage, current, power, SOC, cell temp,
#      MOSFET temp, time remaining, remaining Ah, cell delta, SOH, discharge
#      cycles, full capacity, cell min/max voltage, protection/balancing/
#      battery-state text, and all 16 individual cell voltages (3-decimal
#      resolution) per battery
#    - The entire Victron MPPT solar controller (no firmware auto-discovery
#      exists for this at all)
#    - Combined/system-wide sensors and the "connected"/LWT status sensors
#
#  It is written as a Home Assistant "package" so it merges safely alongside
#  your existing configuration.yaml and any other packages, instead of
#  fighting over a single top-level `mqtt:` key.
#
#  ── Install ──────────────────────────────────────────────────────────────
#  1. Enable packages in configuration.yaml (skip if already enabled):
#       homeassistant:
#         packages: !include_dir_named packages
#  2. Copy this file into  <config>/packages/litime_victron_mqtt.yaml
#  3. Edit the `litime` / `victron` topic-base values below (Ctrl+F/replace)
#     if you changed MQTT_TOPIC_BASE / MQTT_VICTRON_TOPIC_BASE in config.h
#     (defaults are "litime" and "victron" — matches this file as written).
#  4. Settings -> System -> Restart, or Developer Tools -> YAML -> Check
#     Configuration then "Reload All YAML Configuration".
#
#  All entities below are grouped into 3 devices: "LiTime Battery 1",
#  "LiTime Battery 2", and "Victron MPPT", plus a virtual "LiTime System"
#  device for the combined/system-wide sensors.
# =============================================================================

mqtt:
  # ── Connectivity (LWT) ────────────────────────────────────────────────────
  binary_sensor:
    - name: "LiTime Monitor Online"
      unique_id: litime_monitor_online
      state_topic: "litime/status"
      payload_on: "online"
      payload_off: "offline"
      device_class: connectivity
      device:
        identifiers: "litime_system"
        name: "LiTime System"
        manufacturer: "LiTime / Victron (custom monitor)"

    - name: "Battery 1 Connected"
      unique_id: litime_battery1_connected
      state_topic: "litime/battery1/state"
      value_template: "{{ 'ON' if value_json.connected else 'OFF' }}"
      device_class: connectivity
      device: &battery1_device
        identifiers: "litime_battery_1"
        name: "LiTime Battery 1"
        manufacturer: "LiTime"
        model: "48V 100Ah Smart ComFlex"

    - name: "Battery 2 Connected"
      unique_id: litime_battery2_connected
      state_topic: "litime/battery2/state"
      value_template: "{{ 'ON' if value_json.connected else 'OFF' }}"
      device_class: connectivity
      device: &battery2_device
        identifiers: "litime_battery_2"
        name: "LiTime Battery 2"
        manufacturer: "LiTime"
        model: "48V 100Ah Smart ComFlex"

    - name: "Victron MPPT Data Valid"
      unique_id: victron_mppt_valid
      state_topic: "victron/state"
      value_template: "{{ 'ON' if value_json.valid else 'OFF' }}"
      device_class: connectivity
      device: &victron_device
        identifiers: "victron_mppt"
        name: "Victron MPPT"
        manufacturer: "Victron Energy"
        model: "SmartSolar/BlueSolar MPPT"

  # ── Battery 1 — additional fields not covered by firmware discovery ─────
  sensor:
    - name: "Battery 1 Voltage"
      unique_id: litime_battery1_voltage
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.total_voltage }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      suggested_display_precision: 3
      device: *battery1_device

    - name: "Battery 1 Current"
      unique_id: litime_battery1_current
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.current }}"
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      suggested_display_precision: 3
      device: *battery1_device

    - name: "Battery 1 Power"
      unique_id: litime_battery1_power
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.power }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      suggested_display_precision: 1
      device: *battery1_device

    - name: "Battery 1 SOC"
      unique_id: litime_battery1_soc
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.soc }}"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      suggested_display_precision: 0
      device: *battery1_device

    - name: "Battery 1 Cell Temp"
      unique_id: litime_battery1_cell_temp
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.cell_temp }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      suggested_display_precision: 3
      device: *battery1_device

    - name: "Battery 1 MOSFET Temp"
      unique_id: litime_battery1_mosfet_temp
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.mosfet_temp }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      suggested_display_precision: 3
      device: *battery1_device

    - name: "Battery 1 Time Remaining"
      unique_id: litime_battery1_time_remaining_text
      state_topic: "litime/battery1/state"
      value_template: >-
        {{ 'Idle' if (value_json.time_direction == 'idle' or (value_json.time_remaining_s | int(0)) <= 0) else
           ((value_json.time_remaining_s | int(0) // 3600) ~ 'h ' ~
            '%02d' | format((value_json.time_remaining_s | int(0) % 3600) // 60) ~ 'm ' ~
            ('to Full' if value_json.time_direction == 'to_full' else 'to Reserve')) }}
      icon: mdi:timer-outline
      device: *battery1_device

    - name: "Battery 1 Time Remaining (Raw)"
      unique_id: litime_battery1_time_remaining_s
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.time_remaining_s }}"
      unit_of_measurement: "s"
      device_class: duration
      entity_category: diagnostic
      device: *battery1_device

    - name: "Battery 1 Remaining Ah"
      unique_id: litime_battery1_remaining_ah
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.remaining_ah }}"
      unit_of_measurement: "Ah"
      state_class: measurement
      suggested_display_precision: 2
      device: *battery1_device

    - name: "Battery 1 Cell Delta"
      unique_id: litime_battery1_cell_delta_mv
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.cell_delta_mv }}"
      unit_of_measurement: "mV"
      state_class: measurement
      suggested_display_precision: 1
      device: *battery1_device

    - name: "Battery 1 SOH"
      unique_id: litime_battery1_soh
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.soh }}"
      device: *battery1_device

    - name: "Battery 1 Discharge Cycles"
      unique_id: litime_battery1_discharge_cycles
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.discharge_cycles }}"
      state_class: total_increasing
      device: *battery1_device

    - name: "Battery 1 Full Capacity"
      unique_id: litime_battery1_full_capacity_ah
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.full_capacity_ah }}"
      unit_of_measurement: "Ah"
      state_class: measurement
      suggested_display_precision: 1
      device: *battery1_device

    - name: "Battery 1 Cell Min Voltage"
      unique_id: litime_battery1_cell_min_v
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.cell_min_v }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      suggested_display_precision: 3
      device: *battery1_device

    - name: "Battery 1 Cell Max Voltage"
      unique_id: litime_battery1_cell_max_v
      state_topic: "litime/battery1/state"
      value_template: "{{ value_json.cell_max_v }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      suggested_display_precision: 3
      device: *battery1_device

    - name: "Battery 1 Time Direction"
      unique_id: litime_battery1_time_direction
      state_topic: "litime/battery1/state"
      value_template: >-
        {{ 'Charging (to Full)' if value_json.time_direction == 'to_full' else
           ('Discharging (to Reserve)' if value_json.time_direction == 'to_empty' else 'Idle') }}
      icon: mdi:swap-vertical-bold
      device: *battery1_device

    - name: "Battery 1 Protection"
      unique_id: litime_battery1_protection
      state_topic: "litime/battery1/state"
      value_template: >-
        {%- set n = value_json.protection | int(0, 16) -%}
        {%- set names = ['Cell Overvoltage','Cell Undervoltage','Pack Overvoltage','Pack Undervoltage','Charge Over Temp','Charge Under Temp','Discharge Over Temp','Discharge Under Temp','Charge Overcurrent','Discharge Overcurrent','Short Circuit','IC Error','Software Lock'] -%}
        {%- set ns = namespace(active=[]) -%}
        {%- for i in range(names | length) -%}
          {%- if (n // (2 ** i)) % 2 == 1 -%}
            {%- set ns.active = ns.active + [names[i]] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.active | join(', ') if ns.active else 'OK (No Faults)' }}
      icon: mdi:shield-alert-outline
      device: *battery1_device

    - name: "Battery 1 Balancing"
      unique_id: litime_battery1_balancing
      state_topic: "litime/battery1/state"
      value_template: >-
        {%- set s = value_json.balancing | string -%}
        {%- set ns = namespace(active=[]) -%}
        {%- for i in range(s | length) -%}
          {%- if s[i] == '1' -%}
            {%- set ns.active = ns.active + ['Cell ' ~ (i + 1)] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.active | join(', ') if ns.active else 'None' }}
      icon: mdi:scale-balance
      device: *battery1_device

    - name: "Battery 1 State"
      unique_id: litime_battery1_battery_state
      state_topic: "litime/battery1/state"
      value_template: >-
        {%- set n = value_json.battery_state | int(0, 16) -%}
        {%- set ns = namespace(active=[]) -%}
        {%- if (n // 1) % 2 == 1 -%}{%- set ns.active = ns.active + ['Charging'] -%}{%- endif -%}
        {%- if (n // 2) % 2 == 1 -%}{%- set ns.active = ns.active + ['Discharging'] -%}{%- endif -%}
        {%- if (n // 4) % 2 == 1 -%}{%- set ns.active = ns.active + ['Balancing'] -%}{%- endif -%}
        {%- if (n // 8) % 2 == 1 -%}{%- set ns.active = ns.active + ['Full'] -%}{%- endif -%}
        {%- if (n // 64) % 2 == 1 -%}{%- set ns.active = ns.active + ['Heating'] -%}{%- endif -%}
        {{ ns.active | join(' + ') if ns.active else 'Idle' }}
      icon: mdi:battery-heart-variant
      device: *battery1_device

    - name: "Battery 1 Heat State"
      unique_id: litime_battery1_heat_state
      state_topic: "litime/battery1/state"
      value_template: >-
        {{ 'Heating Active' if (value_json.heat_state | int(0, 16)) != 0 else 'Idle' }}
      icon: mdi:radiator
      device: *battery1_device

